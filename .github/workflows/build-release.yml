name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

# Quieter until actions default to Node 24 (GitHub deprecation of Node 20 on runners)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller Pillow

      - name: Generate icon.ico (if missing)
        run: |
          python -c "
          import os
          if not os.path.isfile('icon.ico'):
              try:
                  from PIL import Image, ImageDraw
                  img = Image.new('RGBA', (256, 256), (26, 26, 46, 255))
                  draw = ImageDraw.Draw(img)
                  draw.polygon([(70,40),(70,216),(220,128)], fill=(220,38,38))
                  draw.polygon([(110,60),(110,160),(160,196),(160,60)], fill=(255,255,255))
                  draw.polygon([(120,160),(160,196),(200,160)], fill=(255,255,255))
                  img.save('icon.ico', format='ICO', sizes=[(256,256),(64,64),(32,32),(16,16)])
              except Exception:
                  pass
          "

      - name: Build with PyInstaller
        run: pyinstaller build.spec

      - name: Zip output folder
        run: Compress-Archive -Path "dist\YT-Downloader\*" -DestinationPath "dist\YT-Downloader-Windows.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: YT-Downloader-Windows
          path: dist/YT-Downloader-Windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller build.spec

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create .dmg
        run: |
          if [ -d "dist/YT-Downloader.app" ]; then
            create-dmg \
              --volname "YT Downloader" \
              --window-pos 200 120 \
              --window-size 480 360 \
              --icon "YT-Downloader.app" 120 180 \
              --app-drop-link 360 180 \
              "dist/YT-Downloader.dmg" \
              "dist/YT-Downloader.app" \
            || true
            if [ ! -f "dist/YT-Downloader.dmg" ]; then
              hdiutil create -volname "YT Downloader" \
                -srcfolder "dist/YT-Downloader.app" \
                -ov -format UDZO "dist/YT-Downloader.dmg"
            fi
          else
            # Fallback: zip the one-dir output
            cd dist && zip -r YT-Downloader-macOS.zip YT-Downloader/ && cd ..
            mv dist/YT-Downloader-macOS.zip dist/YT-Downloader.dmg
          fi

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: YT-Downloader-macOS
          path: dist/YT-Downloader.dmg

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ github.ref_name }}"
          body: |
            ## Downloads

            | Platform | File |
            |----------|------|
            | Windows  | `YT-Downloader-Windows.zip` |
            | macOS    | `YT-Downloader.dmg` |

            ### How to use
            1. Download the file for your OS
            2. **Windows**: Extract the zip and run `YT-Downloader.exe` (no install needed)
            3. **macOS**: Open `YT-Downloader.dmg`, drag the app to Applications
            4. FFmpeg is bundled automatically — no separate install required

            ### Features
            - Audio downloads: MP3, AAC, FLAC, WAV, OGG
            - Video downloads: MP4 up to 4K
            - Playlist support with parallel downloads
            - Cancel, retry failed, progress bars, dark/light mode
          files: |
            artifacts/YT-Downloader-Windows/YT-Downloader-Windows.zip
            artifacts/YT-Downloader-macOS/YT-Downloader.dmg
          draft: false
          prerelease: false
